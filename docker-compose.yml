version: "3.8"

services:
  db:
    image: postgres:16
    container_name: mygift_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PW}
      POSTGRES_DB: ${PG_DB}
    ports:
      - "5432:5432"
    volumes:
      - mygift_pgdata:/var/lib/postgresql/data

volumes:
  mygift_pgdata: